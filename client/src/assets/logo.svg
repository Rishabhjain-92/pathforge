<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9A3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield/Flame outer shape -->
  <path
    d="M50 5 L85 20 L85 55 C85 75 65 90 50 97 C35 90 15 75 15 55 L15 20 Z"
    fill="url(#flameGrad)"
    filter="url(#glow)"
  />

  <!-- Inner dark shield -->
  <path
    d="M50 14 L78 27 L78 55 C78 71 62 84 50 90 C38 84 22 71 22 55 L22 27 Z"
    fill="url(#shieldGrad)"
  />

  <!-- Arrow path (forward movement) -->
  <path
    d="M32 52 L52 52 L52 44 L68 54 L52 64 L52 56 L32 56 Z"
    fill="url(#flameGrad)"
    filter="url(#glow)"
  />

  <!-- Small hammer head on top of arrow -->
  <rect x="60" y="36" width="12" height="7" rx="2"
    fill="#FF9A3C"
    transform="rotate(-35 66 39)"
  />
  <rect x="63" y="38" width="4" height="12" rx="1.5"
    fill="#FF7A1A"
    transform="rotate(-35 65 44)"
  />
</svg>