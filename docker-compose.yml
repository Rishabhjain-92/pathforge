version: "3.8"

services:
  # Internal Database for n8n to persist configurations & workflows
  postgres:
    image: postgres:16-alpine
    container_name: pathforge_n8n_db
    restart: always
    environment:
      - POSTGRES_USER=${N8N_DB_USER:-n8n}
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-n8n_secure_pass_123}
      - POSTGRES_DB=${N8N_DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # n8n Workflow Automation Engine
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: pathforge_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${N8N_DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n_secure_pass_123}
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # Express Node.js Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pathforge_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - AUTOMATION_API_KEY=${AUTOMATION_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - n8n

  # React Vite Frontend SPA
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pathforge_client
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
  n8n_data:
